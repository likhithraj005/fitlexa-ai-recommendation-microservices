spring.application.name=config-server
server.port=8888

##Configs from local files
#spring.profiles.active=native
#
##/resources/config/*
#spring.cloud.config.server.native.search-locations=classpath:/config

#spring.cloud.config.server.git.uri=https://github.com/likhithraj005/fitness-microservices-config-server.git
spring.cloud.config.server.git.uri=${GIT_URL:https://github.com/likhithraj005/fitness-microservices-config-server.git}
#spring.cloud.config.server.git.uri=${GIT_URL}
spring.cloud.config.server.git.default-label=main

spring.cloud.config.server.bootstrap=false

#eureka.client.service-url.defaultZone=http://localhost:8761/eureka
#eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
#eureka.client.service-url.defaultZone=https://eureka-server-fitness-latest.onrender.com/eureka/

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
